name: Frontend Dependencies CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  flutter-deps:
    name: Install Flutter dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter (explicit version to avoid channel resolution issues)
        uses: subosito/flutter-action@v2
        with:
          # Use an explicit Flutter SDK that includes a Dart SDK >= 3.11.0
          # (adjust if your local dev uses a different Flutter version)
          flutter-version: '3.13.6'

      - name: Show Flutter and Dart versions (diagnostics)
        run: |
          flutter --version
          dart --version || true

      - name: Show pubspec SDK constraint
        run: |
          if [ -f pubspec.yaml ]; then grep "sdk:" -n pubspec.yaml || true; fi

      - name: Flutter --version (before upgrade)
        run: flutter --version

      - name: Upgrade Flutter to latest stable
        run: |
          set -e
          flutter upgrade --force

      - name: Flutter --version (after upgrade)
        run: flutter --version

      - name: Get Flutter packages
        run: flutter pub get

  python-tests-deps:
    name: Install Python test dependencies and generate testcases
    runs-on: ubuntu-latest
    needs: flutter-deps
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install pip dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f "lib/frontend/selenium-tests/requirements.txt" ]; then python -m pip install -r lib/frontend/selenium-tests/requirements.txt; fi

      - name: Generate testcases Excel
        run: |
          python lib/frontend/selenium-tests/generate_testcases.py

      - name: Upload generated testcases artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-testcases
          path: lib/frontend/selenium-tests/testcases_99.xlsx
